# GitHub Actions workflow – React/Vite frontend
# Jobs: build, then lint / test / security (each depends on build)
name: CI/CD

# Trigger workflow on push and pull request events against master branch
# All jobs have repeteated steps, which are: prepare environment (re usable action)
on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Action
        uses: ./.github/workflows/prepareAction

      # Build the project
      - name: Build
        run: npm run build

      # Upload the build artifact
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Action
        uses: ./.github/workflows/prepareAction

      # Run Linting
      - name: Run Linting
        run: npm run lint

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Action
        uses: ./.github/workflows/prepareAction

      # Run Tests
      - name: Run Tests
        run: npm run test

  security:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Run Trivy vulnerability scanner to check for vulnerabilities
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          # Only show critical and high vulnerabilities
          severity: "CRITICAL,HIGH"
