name: "Setup Node and npm cache"
description: "Sets up Node 20, caches node_modules, and runs npm ci"
runs:
  using: "composite"
  steps:
    # Cache node modules to speed up builds
    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    # Set up Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    # Install dependencies
    - name: Install dependencies
      shell: bash
      run: npm ci
